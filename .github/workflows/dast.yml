name: "DAST Dynamic Security Scan"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Runs at 00:00 every Saturday
    - cron: '0 0 * * 6'

jobs:
  zap_scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    
    # Run Juice Shop as a background service
    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # Target the service container running locally
          target: 'http://localhost:3000'
          # This ensures the pipeline fails if vulnerabilities are found
          fail_action: true
          # ZAP rules: block on any High or Medium alerts
          rules_file_name: '.zap/rules.tsv'
          token: ${{ secrets.GITHUB_TOKEN }}
