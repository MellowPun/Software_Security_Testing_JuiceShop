name: "SCA Dependency Scan"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Runs at 00:00 every Monday
    - cron: '0 0 * * 1'

jobs:
  snyk-scan:
    name: Snyk Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        # We need the lockfile to be analyzed accurately
        run: npm install --package-lock-only

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # This flag ensures the pipeline blocks on any finding
          args: --severity-threshold=low# This workflow uses actions that are not certified by GitHub.
